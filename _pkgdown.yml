url: https://oucru-modelling.github.io/oucru/
template:
  bootstrap: 5

reference:
  - title: OUCRU themes and colors
    desc: Functions related to OUCRU official brand guideline themes and colors
  - subtitle: "`ggplot2` scales"
    desc: Functions for `ggplot2` scales coloring
  - contents: starts_with("scale_")
  - subtitle: Miscellanous color functions
  - contents:
      - "oucru_color"
      - "oucru_palette"
      - "oucru_list_pals"

  - title: Generate report tables
    desc: These functions' purpose are to generate report tables, outputting a
      `flextable` or a intermediate object of class `ss_table` for post-hoc
      manipulation
  - subtitle: Generate baseline table 1
  - contents:
      - starts_with("sstable.baseline")
  - subtitle: Report table helper functions
  - contents:
      - "contSummary"
      - "getlabel"
